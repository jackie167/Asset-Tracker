packages:
  "framer-motion": "For smooth page transitions and micro-interactions"
  "recharts": "For the 7-day portfolio value area chart"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to efficiently merge Tailwind CSS classes"
  "date-fns": "For formatting dates in the chart and last updated times"
  "react-hook-form": "For the holding creation/edit forms"
  "@hookform/resolvers": "Zod resolver for form validation"
  "zod": "Schema validation for forms"

images:
  - path: "artifacts/finance-tracker/public/images/logo.png"
    description: "Minimalist geometric logo mark representing wealth and growth, white on transparent background, sleek and modern"
    aspect_ratio: "1:1"
  - path: "artifacts/finance-tracker/public/images/empty-state.png"
    description: "Abstract 3D rendering of a geometric floating coin or graph in dark cinematic lighting, minimal and elegant"
    aspect_ratio: "1:1"

notes:
  - Assuming API client is available at @workspace/api-client-react
  - Using framer-motion for premium feel
  - Using Recharts for data visualization
